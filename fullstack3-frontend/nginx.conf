# ============================================================
# ARCHIVO: fullstack3-frontend/nginx.conf
# DESCRIPCIÓN: Configuración de Nginx para servir la SPA Angular.
# El punto clave es "try_files" que redirige todas las rutas
# al index.html, permitiendo que Angular maneje el routing.
# Sin esto, al recargar /productos dará 404 en Nginx.
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Directorio donde están los archivos compilados de Angular
    root /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para mejorar performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        # Intenta servir el archivo exacto; si no existe,
        # redirige al index.html para que Angular maneje la ruta
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos (JS, CSS, imágenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
