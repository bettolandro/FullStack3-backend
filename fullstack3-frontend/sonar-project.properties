# =====================================================
# SonarQube - Configuración del proyecto FullStack3
# Archivo: sonar-project.properties
# Ubicación: fullstack3-frontend/sonar-project.properties
# =====================================================

sonar.projectKey=fullstack3-frontend
sonar.projectName=FullStack3 - Frontend Angular
sonar.projectVersion=1.0

# Directorio raíz del código fuente a analizar
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Lenguaje principal
sonar.language=ts

# Exclusiones (no analizar archivos de configuración ni generados)
sonar.exclusions=**/node_modules/**,**/*.spec.ts,**/environments/**,**/*.scss,**/assets/**,**/dist/**

# Inclusión de archivos de test para análisis de cobertura
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Cobertura: apuntar al reporte LCOV generado por Karma/Istanbul
sonar.javascript.lcov.reportPaths=coverage/fullstack3-frontend/lcov.info

# TypeScript config
sonar.typescript.tsconfigPath=tsconfig.json
