
<div class="login-page">

  <!-- Fondo decorativo con grid y gradientes -->
  <div class="login-bg">
    <div class="grid-overlay"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
  </div>

  <!-- Tarjeta central del formulario -->
  <div class="login-card fade-in">

    <!-- ── ENCABEZADO ───────────────────────────────────── -->
    <div class="login-header">
      <div class="login-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
      <h1 class="login-title">FullStack<span>3</span></h1>
      <p class="login-subtitle">Sistema de Gestión · Ingresa tus credenciales</p>
    </div>

    <!-- ── FORMULARIO REACTIVO ──────────────────────────── -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <!-- Campo: Correo -->
      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <div class="input-wrapper">
          <!-- Ícono decorativo -->
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            id="correo"
            type="email"
            formControlName="correo"
            placeholder="usuario@email.com"
            autocomplete="email"
            [class.error]="correo.invalid && correo.touched"
          >
        </div>
        <!-- Mensajes de validación reactiva -->
        <span class="error-msg" *ngIf="correo.touched && correo.errors?.['required']">
          El correo es obligatorio
        </span>
        <span class="error-msg" *ngIf="correo.touched && correo.errors?.['email']">
          Ingresa un correo válido
        </span>
      </div>

      <!-- Campo: Password -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <!-- El tipo cambia según mostrarPassword -->
          <input
            id="password"
            [type]="mostrarPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
            [class.error]="password.invalid && password.touched"
          >
          <!-- Botón para alternar visibilidad -->
          <button type="button" class="toggle-password" (click)="togglePassword()" tabindex="-1">
            <svg *ngIf="!mostrarPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="mostrarPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="error-msg" *ngIf="password.touched && password.errors?.['required']">
          La contraseña es obligatoria
        </span>
        <span class="error-msg" *ngIf="password.touched && password.errors?.['minlength']">
          Mínimo 3 caracteres
        </span>
      </div>

      <!-- Botón Submit -->
      <button
        type="submit"
        class="btn-login"
        [disabled]="cargando"
      >
        <!-- Spinner mientras carga -->
        <span *ngIf="cargando" class="btn-spinner"></span>
        <span *ngIf="!cargando">
          Iniciar sesión
        </span>
        <span *ngIf="cargando">Verificando...</span>
      </button>

    </form>

    

  </div>
</div>
