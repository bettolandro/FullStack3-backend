<!doctype html>
<!--
  ARCHIVO: src/index.html
  DESCRIPCIÓN: Punto de entrada HTML de la aplicación Angular.
  Angular inyecta aquí el bundle compilado automáticamente.
  El selector <app-root> es donde se renderiza AppComponent.
-->
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>FullStack3 — Sistema de Gestión</title>
  <base href="/">

  <!-- Responsive: indispensable para que el diseño funcione en móvil -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon y tema -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><polygon points='13 2 3 14 12 14 11 22 21 10 12 10 13 2' fill='%234f8ef7'/></svg>">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="description" content="FullStack3 - Sistema de gestión de usuarios y productos con microservicios Spring Boot">

  <!-- Preconectar con Google Fonts para acelerar la carga de fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <!--
    app-root: Angular reemplaza este elemento con el contenido
    del AppComponent al iniciar la aplicación.
    Mientras carga, muestra un fondo oscuro (definido en styles.scss).
  -->
  <app-root></app-root>
</body>
</html>
