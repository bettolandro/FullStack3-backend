
<nav class="navbar-custom">
  <div class="navbar-inner">

    <!-- ── LOGO / MARCA ──────────────────────────────────── -->
    <a routerLink="/dashboard" class="navbar-brand" (click)="cerrarMenu()">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
      <span class="brand-name">Betto's<span class="brand-accent">Shop</span></span>
    </a>

    <!-- ── MENÚ DESKTOP ───────────────────────────────────── -->
    <ul class="nav-links">
      <!-- Dashboard: visible para todos -->
      <li>
        <a routerLink="/dashboard" routerLinkActive="active" (click)="cerrarMenu()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Dashboard
        </a>
      </li>

      <!-- Usuarios: solo visible para ADMIN -->
      <li *ngIf="authService.isAdmin()">
        <a routerLink="/usuarios" routerLinkActive="active" (click)="cerrarMenu()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Usuarios
        </a>
      </li>

      <!-- Productos: visible para todos -->
      <li>
        <a routerLink="/productos" routerLinkActive="active" (click)="cerrarMenu()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          Productos
        </a>
      </li>
    </ul>

    <!-- ── INFO DE USUARIO + LOGOUT ──────────────────────── -->
    <div class="navbar-right">
      <!-- Avatar + nombre -->
      <div class="user-info">
        <div class="user-avatar">{{ inicialNombre }}</div>
        <div class="user-details hide-tablet">
          <span class="user-name">{{ sesion?.nombre }}</span>
          <span class="badge" [ngClass]="rolBadge.clase">{{ rolBadge.texto }}</span>
        </div>
      </div>

      <!-- Botón logout desktop -->
      <button class="btn-logout hide-mobile" (click)="confirmarLogout()" title="Cerrar sesión">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Salir
      </button>

      <!-- Botón hamburguesa (móvil) -->
      <button class="hamburger" (click)="toggleMenu()" [class.open]="menuAbierto">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- ── MENÚ MÓVIL (overlay) ───────────────────────────── -->
  <div class="mobile-menu" [class.open]="menuAbierto">
    <div class="mobile-user-info">
      <div class="user-avatar large">{{ inicialNombre }}</div>
      <div>
        <div class="user-name">{{ sesion?.nombre }}</div>
        <span class="badge" [ngClass]="rolBadge.clase">{{ rolBadge.texto }}</span>
      </div>
    </div>

    <ul class="mobile-nav-links">
      <li>
        <a routerLink="/dashboard" routerLinkActive="active" (click)="cerrarMenu()">
          Dashboard
        </a>
      </li>
      <li *ngIf="authService.isAdmin()">
        <a routerLink="/usuarios" routerLinkActive="active" (click)="cerrarMenu()">
          Usuarios
        </a>
      </li>
      <li>
        <a routerLink="/productos" routerLinkActive="active" (click)="cerrarMenu()">
          Productos
        </a>
      </li>
      <li>
        <button class="btn-logout-mobile" (click)="confirmarLogout(); cerrarMenu()">
          Cerrar sesión
        </button>
      </li>
    </ul>
  </div>
</nav>
