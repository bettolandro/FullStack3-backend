# ============================================================
# ARCHIVO: docker-compose.yml
# ============================================================

version: '3.8'

services:

  # ── BASE DE DATOS ORACLE XE ─────────────────────────────
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle123
      # NO incluir ORACLE_DATABASE: XE porque XE es el nombre
      # por defecto del servicio y causa conflicto ORA-65149
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./init-db:/container-entrypoint-initdb.d
    networks:
      - fullstack3-net
    restart: on-failure
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── MICROSERVICIO USUARIOS ──────────────────────────────
  ms-usuarios:
    build:
      context: ./ms-usuarios
      dockerfile: Dockerfile
    container_name: ms-usuarios
    ports:
      - "8081:8081"
    environment:
      # Nombre del servicio Docker como host de Oracle
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521:XE
      SPRING_DATASOURCE_USERNAME: MS_USUARIOS
      SPRING_DATASOURCE_PASSWORD: msusuarios123
    depends_on:
      oracle-db:
        condition: service_healthy   # Espera al healthcheck de Oracle
    networks:
      - fullstack3-net
    restart: on-failure

  # ── MICROSERVICIO PRODUCTOS ─────────────────────────────
  ms-productos:
    build:
      context: ./ms-productos
      dockerfile: Dockerfile
    container_name: ms-productos
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521:XE
      SPRING_DATASOURCE_USERNAME: MS_PRODUCTOS
      SPRING_DATASOURCE_PASSWORD: msproductos123
    depends_on:
      oracle-db:
        condition: service_healthy   # Espera al healthcheck de Oracle
    networks:
      - fullstack3-net
    restart: on-failure

  # ── FRONTEND ANGULAR ────────────────────────────────────
  frontend:
    build:
      context: ./fullstack3-frontend
      dockerfile: Dockerfile
    container_name: fullstack3-frontend
    ports:
      - "80:80"
    depends_on:
      - ms-usuarios
      - ms-productos
    networks:
      - fullstack3-net
    restart: on-failure

networks:
  fullstack3-net:
    driver: bridge

volumes:
  oracle-data:
